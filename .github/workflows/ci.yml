name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore

      # Quality gates — a build quebra em qualquer aviso ou divergência de formatação.
      - name: Format (verify)
        run: dotnet format --verify-no-changes

      - name: Build
        run: dotnet build --no-restore -c Release -warnaserror

      - name: Test
        run: dotnet test --no-build -c Release --verbosity normal
