# Ambiente completo para rodar e avaliar a aplicação com UM comando:
#   docker compose up --build
# Sobe o SQL Server, espera ficar saudável, sobe a aplicação (que cria o schema e popula
# os usuários de demonstração automaticamente) e expõe tudo em http://localhost:8080
services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "GestaoEnderecos!2026"
    ports:
      - "1433:1433"
    volumes:
      - mssql-data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -C -S localhost -U sa -P \"$$MSSQL_SA_PASSWORD\" -Q \"SELECT 1\" -b"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  web:
    build: .
    environment:
      # A aplicação lê ConnectionStrings:Default; em .NET o "__" mapeia a seção aninhada.
      ConnectionStrings__Default: "Server=db;Database=GestaoEnderecos;User Id=sa;Password=GestaoEnderecos!2026;TrustServerCertificate=True;Encrypt=False"
      ASPNETCORE_ENVIRONMENT: "Development"
      ASPNETCORE_HTTP_PORTS: "8080"
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

volumes:
  mssql-data:
